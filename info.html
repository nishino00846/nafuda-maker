<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>研修のご案内</title>
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
    background:#f6f7fb; color:#3b3b3b; padding:20px 14px 40px;
  }
  .wrap{max-width:560px; margin:0 auto;}
  header{
    background:#2EC4B6; color:#fff; border-radius:14px;
    padding:18px 16px; text-align:center; margin-bottom:16px;
  }
  header h1{font-size:18px;}
  header p{font-size:12px; opacity:.95; margin-top:4px;}
  .card{
    display:block; background:#fff; border-radius:12px; padding:16px;
    margin-bottom:12px; text-decoration:none; color:inherit;
    box-shadow:0 1px 4px rgba(0,0,0,.08);
  }
  .card:active{transform:scale(.99);}
  .card .t{font-size:16px; font-weight:bold;}
  .card .d{font-size:12px; color:#8a8a8a; margin-top:4px;}
  .card .t::after{content:" ›"; color:#2EC4B6;}
  footer{text-align:center; font-size:11px; color:#aaa; margin-top:24px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>研修のご案内</h1>
    <p>知りたい項目をタップしてください</p>
  </header>
  <div id="menu"></div>
  <footer>このページは随時更新されます</footer>
</div>

<script>
// ============================================
// 案内メニュー(ここに項目を追加するだけでOK)
//   title: 表示名 / desc: 補足 / url: リンク先
// ============================================
const MENU = [
  {
    title: "当日の流れ（送迎・スケジュール）",
    desc: "駅送迎・前夜祭・翌日の動き(PDF)",
    url: "kickoff_nagare.pdf"
  },
  {
    title: "会議アジェンダ",
    desc: "7/3 技術交流会のタイムテーブル(PDF)",
    url: "kickoff_agenda.pdf"
  },
  {
    title: "会議の座席表",
    desc: "会議室の席順(PDF)",
    url: "kickoff_seat_mtg.pdf"
  },
  {
    title: "前夜祭の席次",
    desc: "前夜祭(若鶴)の席順(PDF)",
    url: "kickoff_seat_eve.pdf"
  },
  {
    title: "流しそうめん 班分け",
    desc: "A〜D班・準備班の一覧(PDF)",
    url: "groups.pdf"
  },
  {
    title: "お弁当の手配リスト",
    desc: "7/2 お弁当の対象者(PDF)",
    url: "kickoff_bento.pdf"
  },
  {
    title: "参加者数まとめ",
    desc: "カテゴリ別・工場別の人数(PDF)",
    url: "kickoff_count.pdf"
  }
];

document.getElementById("menu").innerHTML = MENU.map(m =>
  `<a class="card" href="${m.url}">
     <div class="t">${m.title}</div>
     <div class="d">${m.desc}</div>
   </a>`).join("");
</script>
</body>
</html>
